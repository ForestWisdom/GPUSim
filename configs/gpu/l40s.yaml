name: L40S
architecture: Ada Lovelace
gpu_codename: AD102
num_sms: 142
cuda_cores: 18176
tensor_cores: 568
memory_size_gb: 48
memory_type: GDDR6
dram_bw_gbps: 864
l2_cache_kb: 98304
clock_mhz: 2520
tdp_w: 350

# Analytical model parameters.
# tensor_throughput_per_sm is initialized from official dense FP16 Tensor Core throughput.
# clock_mhz is inferred from official FP32 throughput and CUDA core count because the product page
# states rates are based on boost clock but does not expose the clock directly in the summary table.
# l2_bw_gbps and smem_bw_gbps_per_sm are initial model coefficients, not vendor-published specs.
tensor_throughput_per_sm: 1024
simt_throughput_per_sm: 128
l2_bw_gbps: 4000
smem_bw_gbps_per_sm: 160

sources:
  - https://www.nvidia.com/en-us/data-center/l40s/
  - https://images.nvidia.com/aem-dam/Solutions/Data-Center/l4/nvidia-ada-gpu-architecture-whitepaper-V2.02.pdf
